<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Traductor</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a2e">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; flex-direction: column; touch-action: none; -webkit-user-select: none; user-select: none; }

  .half {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  .half.spanish {
    background: #2e1a1a;
    color: #ffe0e0;
    transform: rotate(180deg);
  }
  .half.english {
    background: #1a1a2e;
    color: #e0e0ff;
    border-top: 2px solid #444;
  }

  @media (min-width: 768px) {
    body { flex-direction: row; }
    .half.spanish {
      transform: none;
      border-top: none;
      border-right: 2px solid #444;
    }
    .half.english {
      border-top: none;
    }
  }

  .half.listening {
    outline: 4px solid #fff;
    outline-offset: -4px;
  }
  .half.english.listening { background: #1a2a3e; }
  .half.spanish.listening { background: #3e2a1a; }

  .lang-label {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.5;
    position: absolute;
    bottom: 16px;
  }

  .version {
    font-size: 10px;
    opacity: 0.3;
    position: absolute;
    bottom: 4px;
    right: 8px;
  }

  .text-display {
    font-size: 28px;
    font-weight: 300;
    text-align: center;
    line-height: 1.4;
    max-height: 80%;
    overflow-y: auto;
    padding: 10px;
    width: 100%;
  }

  .hint {
    font-size: 16px;
    opacity: 0.3;
    font-style: italic;
  }

  .status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    position: absolute;
    top: 16px;
    right: 16px;
  }
  .status-dot.idle { background: transparent; }
  .status-dot.listening { background: #ff4444; animation: pulse 1s infinite; }
  .status-dot.translating { background: #ffaa00; animation: pulse 0.5s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .swap-bar {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    width: 70%;
    height: 36px;
    background: #333;
    border: 1px solid #555;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    font-size: 11px;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .swap-bar:active { background: #444; }
  .swap-icon { font-size: 16px; }
  @media (max-width: 767px) {
    .swap-label-top { transform: rotate(180deg); }
  }

  body.swapped .half.spanish { order: 2; transform: none; border-top: 2px solid #444; }
  body.swapped .half.english { order: 1; transform: rotate(180deg); border-top: none; }
  @media (max-width: 767px) {
    body.swapped .swap-label-top { transform: none; }
    body.swapped .swap-label-bottom { transform: rotate(180deg); }
  }

  @media (min-width: 768px) {
    .swap-bar {
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: auto;
      padding: 0 20px;
    }
    body.swapped .half.spanish { transform: none; border-top: none; }
    body.swapped .half.english { transform: none; border-top: none; border-right: 2px solid #444; }
  }
</style>
</head>
<body>

<div class="half spanish" id="spanish-side">
  <div class="status-dot idle" id="es-status"></div>
  <div class="text-display" id="es-text"><span class="hint">Mantén para hablar, suelta para traducir</span></div>
  <div class="lang-label">Español</div>
</div>

<div class="swap-bar" id="swap-btn">
  <span class="swap-label-top">cambiar</span>
  <span class="swap-icon">⇄</span>
  <span class="swap-label-bottom">switch</span>
</div>

<div class="half english" id="english-side">
  <div class="status-dot idle" id="en-status"></div>
  <div class="text-display" id="en-text"><span class="hint">Hold to talk, release to translate</span></div>
  <div class="lang-label">English</div>
  <div class="version" id="version"></div>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  alert('Speech recognition not supported in this browser. Use Chrome on Android or Safari on iOS.');
}

function createRecognizer(lang) {
  const r = new SpeechRecognition();
  r.lang = lang;
  r.interimResults = false;
  r.continuous = true;
  return r;
}

const sides = {
  english: {
    el: document.getElementById('english-side'),
    textEl: document.getElementById('en-text'),
    statusEl: document.getElementById('en-status'),
    lang: 'en-US',
    targetLang: 'es',
    targetSide: 'spanish',
    recognizer: null,
    active: false,
  },
  spanish: {
    el: document.getElementById('spanish-side'),
    textEl: document.getElementById('es-text'),
    statusEl: document.getElementById('es-status'),
    lang: 'es-ES',
    targetLang: 'en',
    targetSide: 'english',
    recognizer: null,
    active: false,
  }
};

async function translate(text, from, to) {
  const url = `https://lingva.ml/api/v1/${from}/${to}/${encodeURIComponent(text)}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.translation) {
      return data.translation;
    }
    return `[Translation error]`;
  } catch (e) {
    return `[Network error]`;
  }
}

function startListening(sideName) {
  const side = sides[sideName];
  if (side.active) return;
  side.active = true;

  if (navigator.vibrate) navigator.vibrate(150);
  side.el.classList.add('listening');
  side.statusEl.className = 'status-dot listening';
  side.textEl.innerHTML = '<span class="hint">Listening...</span>';

  const rec = createRecognizer(side.lang);
  side.recognizer = rec;

  rec.onresult = (e) => {
    let text = '';
    for (let i = 0; i < e.results.length; i++) {
      text += e.results[i][0].transcript + ' ';
    }
    side.textEl.textContent = text.trim() || 'Listening...';
  };

  rec.onerror = (e) => {
    if (e.error !== 'aborted') {
      side.textEl.textContent = `Error: ${e.error}`;
    }
  };

  rec.onend = () => {};

  rec.start();
}

async function stopListening(sideName) {
  const side = sides[sideName];
  if (!side.active) return;
  side.active = false;

  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  side.el.classList.remove('listening');

  if (side.recognizer) {
    side.recognizer.stop();
  }

  const spoken = side.textEl.textContent;
  if (!spoken || spoken === 'Listening...' || spoken.startsWith('Error')) {
    side.statusEl.className = 'status-dot idle';
    side.textEl.innerHTML = `<span class="hint">${sideName === 'english' ? 'Hold to talk, release to translate' : 'Mantén para hablar, suelta para traducir'}</span>`;
    return;
  }

  side.statusEl.className = 'status-dot translating';
  const target = sides[side.targetSide];

  const fromCode = sideName === 'english' ? 'en' : 'es';
  const toCode = side.targetLang;

  const translated = await translate(spoken, fromCode, toCode);

  target.textEl.textContent = translated;
  side.statusEl.className = 'status-dot idle';
}

// Touch / pointer events
Object.keys(sides).forEach(sideName => {
  const el = sides[sideName].el;

  let holdTimer = null;
  let isHolding = false;

  function onDown(e) {
    e.preventDefault();
    holdTimer = setTimeout(() => {
      isHolding = true;
      startListening(sideName);
    }, 200); // slight delay to avoid accidental taps
  }

  function onUp(e) {
    e.preventDefault();
    clearTimeout(holdTimer);
    if (isHolding) {
      isHolding = false;
      stopListening(sideName);
    }
  }

  el.addEventListener('touchstart', onDown, { passive: false });
  el.addEventListener('touchend', onUp, { passive: false });
  el.addEventListener('touchcancel', onUp, { passive: false });

  // Mouse fallback for desktop testing
  el.addEventListener('mousedown', onDown);
  el.addEventListener('mouseup', onUp);
  el.addEventListener('mouseleave', onUp);
});

// Swap sides
function applySwap(swapped) {
  document.body.classList.toggle('swapped', swapped);
  const topLabel = document.querySelector('.swap-label-top');
  const bottomLabel = document.querySelector('.swap-label-bottom');
  topLabel.textContent = swapped ? 'switch' : 'cambiar';
  bottomLabel.textContent = swapped ? 'cambiar' : 'switch';
}
if (localStorage.getItem('swapped') === 'true') applySwap(true);

document.getElementById('swap-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  const swapped = !document.body.classList.contains('swapped');
  applySwap(swapped);
  localStorage.setItem('swapped', swapped);
});

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data.version) {
      document.getElementById('version').textContent = e.data.version;
    }
  });
  // Ask active SW for version on load
  navigator.serviceWorker.ready.then(reg => {
    reg.active.postMessage({ getVersion: true });
  });
}
</script>
</body>
</html>
